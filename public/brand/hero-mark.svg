<svg xmlns="http://www.w3.org/2000/svg" width="400" height="480" viewBox="0 0 400 480" role="img">
  <title>The AI Foundry Kampala — hero mark</title>
  <desc>A grey crowned crane rising from a hexagonal forge, above the wordmark The AI Foundry Kampala</desc>

  <!-- Forge — hexagon -->
  <polygon points="200,310 144,278 144,214 200,182 256,214 256,278" fill="#1c1c2e"/>
  <!-- Forge inner warm layer -->
  <polygon points="200,294 158,270 158,226 200,202 242,226 242,270" fill="#92400e" opacity="0.9"/>
  <!-- Forge core amber -->
  <polygon points="200,278 172,262 172,234 200,218 228,234 228,262" fill="#f59e0b" opacity="0.95"/>
  <!-- Forge hottest centre -->
  <polygon points="200,262 180,250 180,240 200,228 220,240 220,250" fill="#fef3c7" opacity="0.9"/>

  <!-- Spark particles -->
  <circle cx="185" cy="168" r="3" fill="#f59e0b" opacity="0.5"/>
  <circle cx="202" cy="158" r="2.2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="218" cy="170" r="2.5" fill="#f59e0b" opacity="0.35"/>
  <circle cx="176" cy="178" r="2" fill="#f59e0b" opacity="0.3"/>
  <circle cx="224" cy="162" r="2" fill="#f59e0b" opacity="0.3"/>
  <circle cx="192" cy="148" r="1.5" fill="#f59e0b" opacity="0.25"/>

  <!-- Tail feathers at forge opening -->
  <polygon points="184,212 166,230 188,222" fill="#14532d" opacity="0.8"/>
  <polygon points="216,212 234,230 212,222" fill="#14532d" opacity="0.8"/>

  <!-- Crane body -->
  <polygon points="200,212 214,182 222,212 214,242 200,250 186,242 178,212 186,182" fill="#166534"/>

  <!-- Neck -->
  <polygon points="196,182 204,182 208,154 205,134 195,134 192,154" fill="#166534"/>

  <!-- Head -->
  <ellipse cx="200" cy="124" rx="16" ry="14" fill="#166534"/>

  <!-- Beak -->
  <polygon points="210,127 232,122 210,119" fill="#166534"/>

  <!-- Eye -->
  <circle cx="208" cy="123" r="4" fill="#fff" opacity="0.95"/>
  <circle cx="209" cy="123" r="2" fill="#1c1c2e"/>

  <!-- Crown base -->
  <ellipse cx="200" cy="112" rx="11" ry="6" fill="#b91c1c"/>

  <!-- Crown spines -->
  <line x1="186" y1="112" x2="180" y2="92" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
  <line x1="190" y1="110" x2="186" y2="88" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
  <line x1="195" y1="108" x2="193" y2="84" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="107" x2="200" y2="82" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="205" y1="108" x2="207" y2="84" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
  <line x1="210" y1="110" x2="214" y2="88" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
  <line x1="214" y1="112" x2="220" y2="92" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>

  <!-- Spine tips -->
  <circle cx="180" cy="91" r="2" fill="#b91c1c"/>
  <circle cx="186" cy="87" r="2" fill="#b91c1c"/>
  <circle cx="193" cy="83" r="2" fill="#b91c1c"/>
  <circle cx="200" cy="81" r="2.5" fill="#dc2626"/>
  <circle cx="207" cy="83" r="2" fill="#b91c1c"/>
  <circle cx="214" cy="87" r="2" fill="#b91c1c"/>
  <circle cx="220" cy="91" r="2" fill="#b91c1c"/>

  <!-- Left wing -->
  <polygon points="186,182 186,212 130,176 108,194 142,222 180,220" fill="#15803d" opacity="0.9"/>
  <polygon points="130,176 108,194 96,170 126,158" fill="#166534" opacity="0.95"/>
  <line x1="108" y1="194" x2="90" y2="208" stroke="#14532d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="116" y1="200" x2="100" y2="216" stroke="#14532d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="126" y1="206" x2="112" y2="222" stroke="#14532d" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right wing -->
  <polygon points="214,182 214,212 270,176 292,194 258,222 220,220" fill="#15803d" opacity="0.9"/>
  <polygon points="270,176 292,194 304,170 274,158" fill="#166534" opacity="0.95"/>
  <line x1="292" y1="194" x2="310" y2="208" stroke="#14532d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="284" y1="200" x2="300" y2="216" stroke="#14532d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="274" y1="206" x2="288" y2="222" stroke="#14532d" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Legs into forge -->
  <line x1="193" y1="248" x2="190" y2="270" stroke="#166534" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="207" y1="248" x2="210" y2="270" stroke="#166534" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="200" y="360" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#166534" text-anchor="middle" letter-spacing="3">THE AI FOUNDRY</text>
  <line x1="100" y1="370" x2="300" y2="370" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="392" font-family="Georgia, serif" font-size="13" fill="#6b7280" text-anchor="middle" letter-spacing="6">KAMPALA</text>
  <text x="200" y="414" font-family="Georgia, serif" font-size="10" fill="#b45309" text-anchor="middle" letter-spacing="3">POWERED BY MSHAURI</text>
</svg>
