<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144" role="img">
  <title>The AI Foundry Kampala — favicon</title>
  <desc>F lettermark with crowned crane spines on foundry green background</desc>

  <!-- App icon background -->
  <rect x="0" y="0" width="144" height="144" rx="28" fill="#166534"/>

  <!-- F letterform — white -->
  <rect x="34" y="42" width="14" height="76" rx="2" fill="#fff"/>
  <rect x="34" y="42" width="56" height="14" rx="2" fill="#fff"/>
  <rect x="34" y="74" width="44" height="12" rx="2" fill="#fff"/>

  <!-- Crown spines on top of F -->
  <line x1="38" y1="40" x2="34" y2="20" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="47" y1="40" x2="45" y2="15" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="40" x2="56" y2="12" stroke="#dc2626" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="65" y1="40" x2="67" y2="15" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="74" y1="40" x2="78" y2="20" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="40" x2="88" y2="26" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Spine tips -->
  <circle cx="34" cy="18" r="3.5" fill="#f59e0b"/>
  <circle cx="45" cy="13" r="3.5" fill="#f59e0b"/>
  <circle cx="56" cy="10" r="4" fill="#dc2626"/>
  <circle cx="67" cy="13" r="3.5" fill="#f59e0b"/>
  <circle cx="78" cy="18" r="3.5" fill="#f59e0b"/>
  <circle cx="88" cy="24" r="3" fill="#f59e0b"/>

  <!-- Amber forge dot — brand signature bottom right -->
  <circle cx="108" cy="112" r="11" fill="#f59e0b" opacity="0.95"/>
</svg>
